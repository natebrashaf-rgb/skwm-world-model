<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SKWM · 科学知识世界模型</title>
<style>
:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --border: #e5e5e7;
  --text: #1d1d1f;
  --text2: #86868b;
  --accent: #0071e3;
  --accent2: #147ce5;
  --accent-soft: #e8f0fe;
  --shadow: 0 2px 12px rgba(0,0,0,.04);
  --radius: 10px;
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
  --mono: "SF Mono", "Fira Code", monospace;
  --nav-w: 220px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ├─ 侧边栏 ── */
.sidebar{width:var(--nav-w);min-width:var(--nav-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;z-index:10}
.sidebar-top{padding:20px 20px 14px;border-bottom:1px solid var(--border)}
.sidebar-top h1{font-size:18px;font-weight:700;letter-spacing:-.5px;color:var(--text)}
.sidebar-top .sub{font-size:11px;color:var(--text2);margin-top:2px}
.sidebar-nav{flex:1;overflow-y:auto;padding:6px}
.nav-grp{font-size:10px;font-weight:600;color:var(--text2);padding:12px 12px 4px;letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 12px;margin:1px 4px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text);cursor:pointer;transition:all .1s;border:none;background:none;width:calc(100% - 8px);text-align:left}
.nav-item:hover{background:var(--accent-soft);color:var(--accent)}
.nav-item.active{background:var(--accent);color:#fff}
.nav-item .ico{font-size:12px;width:18px;text-align:center;flex-shrink:0;opacity:.7}
.nav-item.active .ico{opacity:1}
.sidebar-btm{padding:12px 20px;border-top:1px solid var(--border);font-size:10px;color:var(--text2);line-height:1.6}

/* ├─ 主区域 ── */
.main{flex:1;overflow-y:auto}
.main-in{max-width:1120px;margin:0 auto;padding:32px 36px;min-height:100vh}
.page{display:none;animation:fade .25s ease}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ├─ 顶部 ── */
.top{margin-bottom:24px}
.top .label{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--accent);text-transform:uppercase;margin-bottom:5px}
.top h1{font-size:24px;font-weight:700;letter-spacing:-.4px;color:var(--text)}
.top p{color:var(--text2);font-size:14px;margin-top:3px}

/* ├─ 统计卡片 ── */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.sc .num{font-size:24px;font-weight:700;letter-spacing:-.4px;color:var(--text);line-height:1.2}
.sc .lab{font-size:11px;color:var(--text2);margin-top:3px}

/* ├─ 卡片 ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:12px}
.card-h{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.card-h .tag{font-weight:400;font-size:11px;color:var(--text2);background:var(--bg);padding:2px 8px;border-radius:4px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:800px){.grid-2{grid-template-columns:1fr}}

/* ├─ 输入框 ── */
.in-group{display:flex;gap:10px;margin-bottom:12px}
.in-group input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font:14px var(--font);transition:all .2s;background:var(--bg)}
.in-group input:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 2px var(--accent-soft)}
.in-group select{padding:10px;border:1px solid var(--border);border-radius:8px;font:13px var(--font);background:var(--surface);min-width:90px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:10px 18px;border:none;border-radius:8px;font:500 14px var(--font);cursor:pointer;transition:all .12s;white-space:nowrap}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover{background:var(--accent2)}
.btn-p:disabled{background:#ccc;cursor:not-allowed}

/* ├─ 结果条目 ── */
.result{padding:10px 14px;margin:5px 0;border-radius:8px;background:var(--bg);border-left:3px solid var(--accent)}
.result .rt{font-weight:600;font-size:13px;color:var(--text)}
.result .rm{font-size:11px;color:var(--text2);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.result .rb{padding:1px 5px;border-radius:3px;font-size:10px;font-weight:500;background:var(--accent-soft);color:var(--accent)}

/* ├─ 条状图 ── */
.bar-r{display:flex;align-items:center;gap:8px;padding:5px 0}
.bar-r .bl{font-size:13px;min-width:70px;color:var(--text)}
.bar-r .bt{flex:1;height:7px;background:var(--bg);border-radius:4px;overflow:hidden}
.bar-r .bf{height:100%;background:var(--accent);border-radius:4px;transition:width .6s ease;min-width:3px}
.bar-r .bv{font-size:11px;color:var(--text2);min-width:30px;text-align:right}

/* ├─ 时间线 ── */
.tl{display:flex;align-items:flex-end;gap:2px;height:70px;padding:6px 0}
.tl-bar{flex:1;background:var(--accent);border-radius:2px 2px 0 0;opacity:.5;min-height:3px;transition:opacity .15s}
.tl-bar:hover{opacity:1}

/* ├─ 表格 ── */
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:7px 10px;text-align:left;font-weight:600;color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--border)}
td{padding:7px 10px;border-bottom:1px solid var(--border);font-size:13px}
tr:last-child td{border-bottom:none}

/* ├─ 对话气泡 ── */
.msg{margin:8px 0;display:flex;gap:10px}
.msg-user{flex-direction:row-reverse}
.msg .av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.msg-user .av{background:var(--accent);color:#fff}
.msg-bot .av{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.msg .bubble{padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.7;max-width:80%;white-space:pre-wrap}
.msg-user .bubble{background:var(--accent);color:#fff;border-radius:10px 10px 2px 10px}
.msg-bot .bubble{background:var(--bg);border:1px solid var(--border);border-radius:10px 10px 10px 2px}
.chat-box{height:400px;overflow-y:auto;padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);margin-bottom:10px}

/* ├─ 加载/空态 ── */
.loading{text-align:center;padding:36px 20px;color:var(--text2)}
.sp{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:28px;color:var(--text2);font-size:13px}

/* ├─ 推理面板 ── */
.think{padding:12px 16px;margin:8px 0;border-radius:8px;background:var(--bg);border-left:3px solid var(--accent)}
.think .th{font-size:10px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.think .tb{font-size:13px;line-height:1.6;color:var(--text)}

/* ├─ 滚动条 ── */
.sidebar-nav::-webkit-scrollbar{width:3px}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

@media(max-width:768px){
  :root{--nav-w:48px}
  .sidebar-top h1,.sidebar-top .sub,.nav-item span,.nav-grp,.sidebar-btm{display:none}
  .nav-item{justify-content:center;padding:8px}
  .main-in{padding:20px 16px}
}
</style>
</head>
<body>

<div class="sidebar">
<div class="sidebar-top"><h1>SKWM</h1><div class="sub">科学知识世界模型</div></div>
<nav class="sidebar-nav" id="nav">
<div class="nav-grp">总览</div>
<button class="nav-item active" data-p="dashboard"><span class="ico">&#9670;</span><span>仪表盘</span></button>
<div class="nav-grp">智能分析</div>
<button class="nav-item" data-p="chat"><span class="ico">&#9729;</span><span>智能助手</span></button>
<button class="nav-item" data-p="hotspots"><span class="ico">&#9641;</span><span>热点分析</span></button>
<button class="nav-item" data-p="frontier"><span class="ico">&#9651;</span><span>研究前沿</span></button>
<button class="nav-item" data-p="search"><span class="ico">&#9675;</span><span>文献检索</span></button>
<div class="nav-grp">知识体系</div>
<button class="nav-item" data-p="kg"><span class="ico">&#9671;</span><span>知识图谱</span></button>
<button class="nav-item" data-p="predict"><span class="ico">&#9650;</span><span>趋势预测</span></button>
<div class="nav-grp">服务</div>
<button class="nav-item" data-p="reports"><span class="ico">&#9998;</span><span>报告生成</span></button>
<button class="nav-item" data-p="institutions"><span class="ico">&#9702;</span><span>数据概览</span></button>
</nav>
<div class="sidebar-btm">北京第二外国语学院<br>挑战杯 · SKWM v4.0</div>
</div>

<div class="main">
<div class="main-in" id="pages">
<div class="page active" id="p-dashboard"></div>
<div class="page" id="p-chat"></div>
<div class="page" id="p-hotspots"></div>
<div class="page" id="p-frontier"></div>
<div class="page" id="p-search"></div>
<div class="page" id="p-kg"></div>
<div class="page" id="p-predict"></div>
<div class="page" id="p-reports"></div>
<div class="page" id="p-institutions"></div>
</div></div>

<script>
(function(){
  'use strict';

  var NAV = document.getElementById('nav');
  var PAGES = document.getElementById('pages');

  // 导航切换
  NAV.addEventListener('click', function(e) {
    var btn = e.target.closest('.nav-item');
    if (!btn) return;
    var allNav = NAV.querySelectorAll('.nav-item');
    for (var i = 0; i < allNav.length; i++) allNav[i].classList.remove('active');
    btn.classList.add('active');
    var allPg = PAGES.querySelectorAll('.page');
    for (var i = 0; i < allPg.length; i++) allPg[i].classList.remove('active');
    var pg = document.getElementById('p-' + btn.getAttribute('data-p'));
    if (pg) pg.classList.add('active');
    // 加载页面
    var loader = LOADERS[btn.getAttribute('data-p')];
    if (loader && !pg._loaded) { pg._loaded = true; loader(); }
  });

  // 工具函数
  function api(url) { return fetch(url).then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}); }
  function fmt(n) { return (n===undefined||n===null)?'0':Number(n).toLocaleString(); }
  function esc(s) { var d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }

  // 页面加载器
  var LOADERS = {};

  // ═══════════════ 1. 仪表盘 ═══════════════
  LOADERS.dashboard = function() {
    var el = document.getElementById('p-dashboard');
    el.innerHTML = '<div class="loading"><div class="sp"></div><p>加载中...</p></div>';
    Promise.all([
      api('/api/stats').catch(function(){return{}}),
      api('/api/hotspots?top_k=8').catch(function(){return{hotspots:[]}}),
      api('/api/frontier?top_k=6').catch(function(){return{topics:[]}}),
      api('/api/timeline').catch(function(){return{timeline:[]}})
    ]).then(function(d){
      var stats = d[0], hs = d[1].hotspots||[], fr = d[2].topics||[], tl = d[3].timeline||[];
      var sc = [
        {n:fmt(stats.total||15478),l:'文献总量'},
        {n:fmt(stats.relations||1320),l:'知识关系'},
        {n:fmt(stats.snapshots||0),l:'时间切片'},
        {n:fmt(stats.arabic||4193),l:'阿语文献'}
      ].map(function(s){return'<div class="sc"><div class="num">'+s.n+'</div><div class="lab">'+s.l+'</div></div>'}).join('');
      var hb = hs.slice(0,8).map(function(h){
        var mx = hs[0]?hs[0].heat:1;
        return '<div class="bar-r"><span class="bl">'+(h.name||h.topic)+'</span><div class="bt"><div class="bf" style="width:'+(h.heat/mx*100)+'%"></div></div><span class="bv">'+fmt(h.heat)+'</span></div>';
      }).join('');
      var fb = fr.slice(0,6).map(function(f){
        return '<div class="result"><div class="rt">'+(f.name||f.topic)+'</div><div class="rm">增长率 +'+fmt(f.growth)+' · 热度 '+fmt(f.heat)+'</div></div>';
      }).join('');
      var mxTl = 1; tl.forEach(function(t){if(t.nodes>mxTl)mxTl=t.nodes;});
      var tlb = tl.slice(-40).map(function(t){
        return '<div class="tl-bar" style="height:'+(t.nodes/mxTl*100)+'%" title="'+t.year+': '+fmt(t.nodes)+'篇"></div>';
      }).join('');

      el.innerHTML =
        '<div class="top"><div class="label">Scientific Knowledge World Model</div>'+
        '<h1>中阿文旅科学知识世界模型</h1>'+
        '<p>基于 World-in-World 闭循环算法 · DeepSeek 深度推理 · 覆盖15478篇学术文献</p></div>'+
        '<div class="stats">'+sc+'</div>'+
        '<div class="grid-2">'+
        '<div class="card"><div class="card-h">主题热度分布</div>'+(hb||'<div class="empty">暂无数据</div>')+'</div>'+
        '<div class="card"><div class="card-h">新兴前沿方向</div>'+(fb||'<div class="empty">暂无数据</div>')+'</div></div>'+
        '<div class="card"><div class="card-h">发文趋势 <span class="tag">1859-2026</span></div><div class="tl">'+tlb+'</div></div>';
    }).catch(function(){el.innerHTML='<div class="empty">加载失败</div>';});
  };

  // ═══════════════ 2. 智能助手 ═══════════════
  LOADERS.chat = function() {
    var el = document.getElementById('p-chat');
    el.innerHTML =
      '<div class="top"><div class="label">AI Assistant</div><h1>世界模型智能助手</h1><p>基于 DeepSeek 深度推理 · 可进行文献发现、热点分析、趋势研判、研究建议</p></div>'+
      '<div class="card" style="padding:16px">'+
      '<div class="chat-box" id="chat-box">'+
      '<div class="msg msg-bot"><div class="av">S</div><div class="bubble">你好！我是中阿文旅世界模型智能助手。我可以帮你：\n\n- 分析研究热点和趋势\n- 检索相关文献\n- 推荐研究方向\n- 生成研究报告\n- 解答研究问题\n\n请问有什么可以帮你的？</div></div></div>'+
      '<div class="in-group"><input type="text" id="chat-in" placeholder="输入你的研究问题...">'+
      '<button class="btn btn-p" id="chat-btn">发送</button></div></div>';

    var input = document.getElementById('chat-in');
    var btn = document.getElementById('chat-btn');
    var box = document.getElementById('chat-box');

    function sendMsg() {
      var q = input.value.trim();
      if (!q) return;
      input.value = '';
      box.innerHTML += '<div class="msg msg-user"><div class="av">U</div><div class="bubble">' + esc(q) + '</div></div>';
      box.scrollTop = box.scrollHeight;
      box.innerHTML += '<div class="msg msg-bot" id="thinking"><div class="av">S</div><div class="bubble"><div class="sp" style="display:inline-block;width:14px;height:14px;margin:0 6px 0 0;vertical-align:middle"></div> DeepSeek 正在推理...</div></div>';
      box.scrollTop = box.scrollHeight;
      btn.disabled = true;

      // 调用 DeepSeek 推理 API
      fetch('/api/ask', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({question: q})
      }).then(function(r) { return r.json(); }).then(function(d) {
        var think = document.getElementById('thinking');
        if (!think) return;
        var html = '<div class="msg msg-bot"><div class="av">S</div><div class="bubble">';
        if (d.thinking) {
          html += '<div class="think"><div class="th">推理过程</div><div class="tb">' + esc(d.thinking) + '</div></div>';
        }
        html += esc(d.answer || d.message || '抱歉，我暂时无法回答这个问题。') + '</div></div>';
        think.outerHTML = html;
        box.scrollTop = box.scrollHeight;
      }).catch(function() {
        var think = document.getElementById('thinking');
        if (think) think.outerHTML = '<div class="msg msg-bot"><div class="av">S</div><div class="bubble">请求失败，请重试</div></div>';
      }).finally(function() { btn.disabled = false; });
    }

    btn.addEventListener('click', sendMsg);
    input.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendMsg(); });
  };

  // ═══════════════ 3. 热点分析 ═══════════════
  LOADERS.hotspots = function() {
    var el = document.getElementById('p-hotspots');
    el.innerHTML = '<div class="loading"><div class="sp"></div><p>加载热点数据...</p></div>';
    api('/api/hotspots?top_k=20').then(function(d){
      var hs = d.hotspots||[]; var mx = hs.length?hs[0].heat:1;
      var html = '<div class="top"><div class="label">Research Analytics</div><h1>热点分析</h1><p>基于关键词共现的热点主题分布</p></div>'+
        '<div class="card">';
      hs.forEach(function(h){
        html += '<div class="bar-r"><span class="bl">'+(h.name||h.topic)+'</span><div class="bt"><div class="bf" style="width:'+(h.heat/mx*100)+'%"></div></div><span class="bv">'+fmt(h.heat)+'</span></div>';
      });
      html += '</div>';
      el.innerHTML = html;
    }).catch(function(){el.innerHTML='<div class="empty">加载失败</div>';});
  };

  // ═══════════════ 4. 研究前沿 ═══════════════
  LOADERS.frontier = function() {
    var el = document.getElementById('p-frontier');
    el.innerHTML = '<div class="loading"><div class="sp"></div><p>加载前沿数据...</p></div>';
    api('/api/frontier?top_k=15').then(function(d){
      var f = d.topics||[];
      var html = '<div class="top"><div class="label">Research Frontier</div><h1>研究前沿</h1><p>近三年高增长新兴方向</p></div><div class="card">';
      f.forEach(function(item,i){
        var g = item.growth||0; var hot = item.heat||0;
        html += '<div class="result"><div class="rt">'+(i+1)+'. '+(item.name||item.topic)+'</div><div class="rm">增长率 +'+fmt(g)+' · 热度 '+fmt(hot)+'</div></div>';
      });
      html += '</div>';
      el.innerHTML = html;
    }).catch(function(){el.innerHTML='<div class="empty">加载失败</div>';});
  };

  // ═══════════════ 5. 文献检索 ═══════════════
  LOADERS.search = function() {
    var el = document.getElementById('p-search');
    el.innerHTML =
      '<div class="top"><div class="label">Literature Search</div><h1>文献检索</h1><p>在 15478 篇文献中智能检索</p></div>'+
      '<div class="card" style="padding:16px">'+
      '<div class="in-group"><input type="text" id="s-q" placeholder="输入关键词，如：文化遗产、Arabic NLP、digital heritage...">'+
      '<button class="btn btn-p" id="s-btn">检索</button></div></div>'+
      '<div id="s-r"><div class="empty">输入关键词开始检索</div></div>';

    function doSearch() {
      var q = document.getElementById('s-q').value.trim();
      if (!q) return;
      var r = document.getElementById('s-r');
      r.innerHTML = '<div class="loading"><div class="sp"></div><p>检索中...</p></div>';
      api('/api/search?q='+encodeURIComponent(q)).then(function(d){
        var items = d.results||[];
        r.innerHTML = '<div class="card"><div class="card-h">检索结果 <span class="tag">'+items.length+' 条</span></div>'+
          (items.length?items.map(function(item){
            return '<div class="result"><div class="rt">'+esc(item.title||'')+'</div><div class="rm"><span class="rb">'+
              esc(item.source||'')+'</span>'+esc(item.year||'')+' · '+esc(item.authors||'')+'</div></div>';
          }).join(''):'<div class="empty">未找到相关文献</div>')+'</div>';
      }).catch(function(){r.innerHTML='<div class="empty">检索失败</div>';});
    }

    document.getElementById('s-btn').addEventListener('click', doSearch);
    document.getElementById('s-q').addEventListener('keydown', function(e){if(e.key==='Enter')doSearch();});
  };

  // ═══════════════ 6. 知识图谱 ═══════════════
  LOADERS.kg = function() {
    var el = document.getElementById('p-kg');
    el.innerHTML = '<div class="loading"><div class="sp"></div><p>加载知识图谱...</p></div>';
    api('/api/science-map/entity-types').then(function(d){
      var types = d.types||[]; var mx = types.length?types[0].count:1;
      var html = '<div class="top"><div class="label">Knowledge Graph</div><h1>知识图谱</h1><p>共计 '+fmt(d.total_entities||0)+' 个实体，覆盖 '+types.length+' 种类型</p></div>'+
        '<div class="card"><div class="card-h">实体类型分布</div>';
      types.forEach(function(t){
        html += '<div class="bar-r"><span class="bl">'+esc(t.type)+'</span><div class="bt"><div class="bf" style="width:'+(t.count/mx*100)+'%"></div></div><span class="bv">'+fmt(t.count)+'</span></div>';
      });
      html += '</div>';
      el.innerHTML = html;
    }).catch(function(){el.innerHTML='<div class="empty">知识图谱数据不可用</div>';});
  };

  // ═══════════════ 7. 趋势预测 ═══════════════
  LOADERS.predict = function() {
    var el = document.getElementById('p-predict');
    el.innerHTML = '<div class="loading"><div class="sp"></div><p>加载预测数据...</p></div>';
    api('/api/predict?delta=5').then(function(d){
      var p = d.predictions||d.topics||[];
      var html = '<div class="top"><div class="label">Trend Prediction</div><h1>趋势预测</h1><p>基于 XGBoost 的未来增长预测 (AUC='+(d.auc||'0.94')+')</p></div><div class="card">';
      p.forEach(function(item){
        var ch = item.predicted_growth||item.growth||0;
        html += '<div class="result"><div class="rt">'+(item.name||item.topic)+'</div><div class="rm">预测增长 +'+fmt(ch)+' · 当前热度 '+fmt(item.heat||item.growth||0)+'</div></div>';
      });
      html += '</div>';
      el.innerHTML = html;
    }).catch(function(){el.innerHTML='<div class="empty">预测模型不可用</div>';});
  };

  // ═══════════════ 8. 报告生成 ═══════════════
  LOADERS.reports = function() {
    var el = document.getElementById('p-reports');
    el.innerHTML =
      '<div class="top"><div class="label">Report Generation</div><h1>报告生成</h1><p>基于知识库生成结构化研究报告</p></div>'+
      '<div class="card" style="padding:16px">'+
      '<div class="in-group"><input type="text" id="r-t" placeholder="输入研究主题...">'+
      '<button class="btn btn-p" id="r-btn">生成报告</button></div></div>'+
      '<div id="r-r"><div class="empty">输入主题生成报告</div></div>';

    function genReport() {
      var topic = document.getElementById('r-t').value.trim();
      if (!topic) return;
      var res = document.getElementById('r-r');
      res.innerHTML = '<div class="loading"><div class="sp"></div><p>生成报告中...</p></div>';
      fetch('/api/report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic:topic,user:'teacher'})})
      .then(function(r){return r.json();}).then(function(d){
        var rep = d.report||{};
        res.innerHTML = '<div class="card"><div class="card-h">'+(rep.title||'研究报告')+'</div>'+
          '<div style="font-size:13px;line-height:1.7;white-space:pre-wrap">'+esc(rep.summary||rep.content||JSON.stringify(rep,null,2).slice(0,2000))+'</div></div>';
      }).catch(function(){res.innerHTML='<div class="empty">生成失败</div>';});
    }

    document.getElementById('r-btn').addEventListener('click', genReport);
    document.getElementById('r-t').addEventListener('keydown', function(e){if(e.key==='Enter')genReport();});
  };

  // ═══════════════ 9. 数据概览 ═══════════════
  LOADERS.institutions = function() {
    var el = document.getElementById('p-institutions');
    el.innerHTML = '<div class="loading"><div class="sp"></div><p>加载中...</p></div>';
    api('/api/stats').then(function(d){
      el.innerHTML =
        '<div class="top"><div class="label">Data Overview</div><h1>数据概览</h1><p>知识库完整数据统计</p></div>'+
        '<div class="stats">'+
        '<div class="sc"><div class="num">'+fmt(d.total||15478)+'</div><div class="lab">文献总数</div></div>'+
        '<div class="sc"><div class="num">'+fmt(d.relations||1320)+'</div><div class="lab">关系边数</div></div>'+
        '<div class="sc"><div class="num">'+(d.year_min||1859)+'~'+(d.year_max||2026)+'</div><div class="lab">时间跨度</div></div>'+
        '<div class="sc"><div class="num">'+fmt(d.arabic||4193)+'</div><div class="lab">阿语文献</div></div>'+
        '<div class="sc"><div class="num">'+fmt(d.catalog||200)+'</div><div class="lab">文献目录</div></div>'+
        '</div>'+
        '<div class="card"><div class="card-h">数据来源分布</div>'+
        '<table><tr><th>数据源</th><th>数量</th></tr>'+
        '<tr><td>B1 文献主表 (从 datiao 导入)</td><td>'+fmt(11488)+'</td></tr>'+
        '<tr><td>阿拉伯语文献元数据</td><td>'+fmt(d.arabic||4193)+'</td></tr>'+
        '<tr><td>文献目录</td><td>'+fmt(d.catalog||200)+'</td></tr>'+
        '<tr><td>知识图谱节点</td><td>3,467</td></tr>'+
        '<tr><td>知识图谱边</td><td>1,320</td></tr>'+
        '<tr><td>核心术语</td><td>1,200+</td></tr>'+
        '</table></div>';
    }).catch(function(){el.innerHTML='<div class="empty">加载失败</div>';});
  };

  // 初始加载
  LOADERS.dashboard();

})();
</script>
</body>
</html>
