<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SKWM · 科学知识世界模型</title>
<style>
:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --border: #e5e5e7;
  --text: #1d1d1f;
  --text2: #86868b;
  --accent: #0071e3;
  --accent2: #147ce5;
  --accent-soft: #e8f0fe;
  --shadow: 0 2px 12px rgba(0,0,0,0.04);
  --radius: 10px;
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  --mono: "SF Mono", "Fira Code", monospace;
  --nav-w: 240px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;overflow:hidden;
     -webkit-font-smoothing:antialiased}

/* Layout */
.sidebar{width:var(--nav-w);min-width:var(--nav-w);background:var(--surface);border-right:1px solid var(--border);
         display:flex;flex-direction:column;height:100vh;z-index:10}
.sidebar-header{padding:20px 20px 14px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:16px;font-weight:700;letter-spacing:-.3px;color:var(--text)}
.sidebar-header .sub{font-size:11px;color:var(--text2);margin-top:2px}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 8px}
.nav-group{font-size:10px;font-weight:600;color:var(--text2);padding:14px 12px 4px;letter-spacing:.08em;text-transform:uppercase}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;margin:1px 0;border-radius:8px;
         font-size:13px;font-weight:500;color:var(--text);cursor:pointer;transition:all .12s;
         border:none;background:none;width:100%;text-align:left}
.nav-btn:hover{background:var(--accent-soft);color:var(--accent)}
.nav-btn.active{background:var(--accent);color:#fff;font-weight:500}
.nav-btn .ico{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-btn .badge{font-size:10px;background:var(--accent);color:#fff;padding:1px 6px;border-radius:6px;margin-left:auto}
.sidebar-footer{padding:12px 20px;border-top:1px solid var(--border);font-size:10px;color:var(--text2);line-height:1.6}

/* Main */
.main{flex:1;overflow-y:auto;position:relative}
.main-inner{max-width:1120px;margin:0 auto;padding:32px 36px;min-height:100vh}
.page{display:none;animation:fade .25s ease}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Hero */
.hero{margin-bottom:28px}
.hero .label{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--accent);text-transform:uppercase;margin-bottom:6px}
.hero h1{font-size:26px;font-weight:700;letter-spacing:-.5px;color:var(--text)}
.hero p{color:var(--text2);font-size:14px;margin-top:4px;line-height:1.6}

/* Stats Grid */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.stat-card .num{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1;color:var(--text)}
.stat-card .label{font-size:12px;color:var(--text2);margin-top:4px}
.stat-card .sub{font-size:10px;color:var(--text2);margin-top:2px;opacity:.7}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;
      box-shadow:var(--shadow);margin-bottom:12px}
.card-title{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;
            color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.card-title .tag{font-weight:400;font-size:11px;color:var(--text2);background:var(--bg);padding:2px 8px;border-radius:4px}

/* Bar Chart */
.bar-row{display:flex;align-items:center;gap:10px;padding:6px 0}
.bar-row .b-label{font-size:13px;font-weight:500;min-width:80px;color:var(--text)}
.bar-row .b-track{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.bar-row .b-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .6s ease;min-width:3px}
.bar-row .b-value{font-size:12px;font-weight:600;color:var(--text2);min-width:40px;text-align:right}

/* Timeline */
.timeline{display:flex;align-items:flex-end;gap:2px;height:80px;padding:8px 0}
.timeline-bar{flex:1;background:var(--accent);border-radius:2px 2px 0 0;opacity:.6;min-height:3px;transition:opacity .2s}
.timeline-bar:hover{opacity:1}

/* Knowledge Graph */
.kg-container{width:100%;height:420px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:#fafafa}
.kg-info{font-size:11px;color:var(--text2);padding:8px 0;display:flex;gap:16px}

/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:8px 10px;text-align:left;font-weight:600;color:var(--text2);font-size:11px;
   text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:13px}
tr:last-child td{border-bottom:none}

/* Search Input */
.search-group{display:flex;gap:10px;margin-bottom:14px}
.search-group input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font:14px var(--font);transition:all .2s;background:var(--bg)}
.search-group input:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 2px var(--accent-soft)}
.search-group select{padding:10px;border:1px solid var(--border);border-radius:8px;font:13px var(--font);background:var(--surface);min-width:100px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:8px;font:500 14px var(--font);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{background:#ccc;cursor:not-allowed}

/* Result Items */
.result{padding:12px 14px;margin:6px 0;border-radius:8px;background:var(--bg);border-left:3px solid var(--accent)}
.result .r-title{font-weight:600;font-size:13px;color:var(--text);margin-bottom:2px}
.result .r-meta{font-size:11px;color:var(--text2);display:flex;gap:8px;flex-wrap:wrap}
.result .r-source{padding:1px 6px;border-radius:3px;font-size:10px;font-weight:500;background:var(--accent-soft);color:var(--accent)}

/* Loading / Empty */
.loading{text-align:center;padding:40px 20px;color:var(--text2)}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;
         animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:32px;color:var(--text2);font-size:13px}

/* Scrollbar */
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* Responsive */
@media(max-width:768px){:root{--nav-w:56px}.sidebar-header h1,.sidebar-header .sub,.nav-btn span,.nav-group,.sidebar-footer{display:none}.nav-btn{justify-content:center;padding:9px}.nav-btn .ico{margin:0}.main-inner{padding:20px 16px}}
</style>
</head>
<body>

<div class="sidebar">
<div class="sidebar-header"><h1>SKWM</h1><div class="sub">科学知识世界模型</div></div>
<nav class="sidebar-nav" id="nav">
<div class="nav-group">Overview</div>
<button class="nav-btn active" data-p="overview"><span class="ico">&#9670;</span> <span>Dashboard</span></button>
<div class="nav-group">Analysis</div>
<button class="nav-btn" data-p="hotspots"><span class="ico">&#9641;</span> <span>Hotspots</span></button>
<button class="nav-btn" data-p="frontier"><span class="ico">&#9651;</span> <span>Frontier</span></button>
<button class="nav-btn" data-p="predict"><span class="ico">&#9650;</span> <span>Predict</span></button>
<div class="nav-group">Knowledge</div>
<button class="nav-btn" data-p="kg"><span class="ico">&#9671;</span> <span>Graph</span></button>
<button class="nav-btn" data-p="science"><span class="ico">&#9673;</span> <span>Science Map</span></button>
<button class="nav-btn" data-p="search"><span class="ico">&#9675;</span> <span>Search</span></button>
<div class="nav-group">Services</div>
<button class="nav-btn" data-p="chat"><span class="ico">&#9729;</span> <span>Assistant</span></button>
<button class="nav-btn" data-p="reports"><span class="ico">&#9998;</span> <span>Reports</span></button>
<button class="nav-btn" data-p="institutions"><span class="ico">&#9702;</span> <span>Institutions</span></button>
</nav>
<div class="sidebar-footer">BISU · Challenge Cup<br>SKWM v4.0 · 15,478 papers</div>
</div>

<div class="main">
<div class="main-inner" id="pages">
<div class="page active" id="p-overview"></div>
<div class="page" id="p-hotspots"></div>
<div class="page" id="p-frontier"></div>
<div class="page" id="p-predict"></div>
<div class="page" id="p-kg"></div>
<div class="page" id="p-science"></div>
<div class="page" id="p-search"></div>
<div class="page" id="p-chat"></div>
<div class="page" id="p-reports"></div>
<div class="page" id="p-institutions"></div>
</div></div>

<script>
(function() {
  'use strict';

  // ── Navigation ──
  document.getElementById('nav').addEventListener('click', function(e) {
    var btn = e.target.closest('.nav-btn');
    if (!btn) return;
    var pages = document.querySelectorAll('.page');
    for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');
    var navs = document.querySelectorAll('.nav-btn');
    for (var i = 0; i < navs.length; i++) navs[i].classList.remove('active');
    btn.classList.add('active');
    var pg = document.getElementById('p-' + btn.getAttribute('data-p'));
    if (pg) pg.classList.add('active');
  });

  // ── API Helper ──
  function api(url) {
    return fetch(url).then(function(r) {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    });
  }

  // ── Format ──
  function fmt(n) {
    if (n === undefined || n === null) return '0';
    return Number(n).toLocaleString();
  }

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function bar(width, label) {
    return '<div class="bar-row"><span class="b-label">' + esc(label) + '</span><div class="b-track"><div class="b-fill" style="width:' + Math.max(3, width) + '%"></div></div></div>';
  }

  // ── Page Loaders ──

  // 1. Dashboard
  function loadDashboard() {
    var el = document.getElementById('p-overview');
    el.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading...</p></div>';

    Promise.all([
      api('/api/stats').catch(function(){return {}}),
      api('/api/hotspots?top_k=8').catch(function(){return {hotspots:[]}}),
      api('/api/frontier?top_k=6').catch(function(){return {topics:[]}}),
      api('/api/timeline').catch(function(){return {timeline:[]}})
    ]).then(function(results) {
      var stats = results[0];
      var hotspots = results[1].hotspots || [];
      var frontier = results[2].topics || [];
      var timeline = results[3].timeline || [];

      var statCards = [
        {num: fmt(stats.total || stats.entities || 15478), label: 'Total Papers'},
        {num: fmt(stats.relations || 1320), label: 'Relations'},
        {num: fmt(stats.snapshots || 0), label: 'Time Slices'},
        {num: fmt(stats.arabic || 4193), label: 'Arabic Docs'}
      ].map(function(s) {
        return '<div class="stat-card"><div class="num">' + s.num + '</div><div class="label">' + s.label + '</div></div>';
      }).join('');

      var hotBars = hotspots.slice(0, 8).map(function(h) {
        return bar(h.heat / (hotspots[0] ? hotspots[0].heat : 1) * 100, h.name || h.topic);
      }).join('');

      var frontItems = frontier.slice(0, 6).map(function(f) {
        return '<div class="result"><div class="r-title">' + esc(f.name || f.topic) + '</div><div class="r-meta">Growth: +' + fmt(f.growth) + ' &middot; Heat: ' + fmt(f.heat) + '</div></div>';
      }).join('');

      var maxTimeline = 1;
      for (var i = 0; i < timeline.length; i++) {
        if (timeline[i].nodes > maxTimeline) maxTimeline = timeline[i].nodes;
      }
      var bars = timeline.slice(-40).map(function(t) {
        return '<div class="timeline-bar" style="height:' + (t.nodes / maxTimeline * 100) + '%;opacity:0.5" title="' + t.year + ': ' + fmt(t.nodes) + ' papers"></div>';
      }).join('');

      el.innerHTML =
        '<div class="hero"><div class="label">Scientific Knowledge World Model</div>' +
        '<h1>China-Arab Cultural Tourism<br>Knowledge World Model</h1>' +
        '<p>World-in-World closed-loop planning &middot; DeepSeek reasoning &middot; ' + fmt(15478) + ' papers</p></div>' +
        '<div class="stats">' + statCards + '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">' +
        '<div class="card"><div class="card-title">Research Hotspots</div>' + (hotBars || '<div class="empty">No data</div>') + '</div>' +
        '<div class="card"><div class="card-title">Emerging Frontiers</div>' + (frontItems || '<div class="empty">No data</div>') + '</div>' +
        '</div>' +
        '<div class="card"><div class="card-title">Publication Timeline</div><div class="timeline">' + bars + '</div></div>';
    }).catch(function() {
      el.innerHTML = '<div class="empty">Failed to load dashboard</div>';
    });
  }

  // 2. Hotspots
  function loadHotspots() {
    var el = document.getElementById('p-hotspots');
    el.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading hotspots...</p></div>';
    api('/api/hotspots?top_k=20').then(function(d) {
      var h = d.hotspots || [];
      var mx = h.length > 0 ? h[0].heat : 1;
      var html = '<div class="hero"><div class="label">Research Analytics</div><h1>Hotspot Analysis</h1><p>Topic heat distribution across ' + fmt(h.length) + ' topics</p></div>';
      html += '<div class="card">';
      h.forEach(function(item) {
        html += bar(item.heat / mx * 100, (item.name || item.topic) + '  (' + fmt(item.heat) + ')');
      });
      html += '</div>';
      el.innerHTML = html;
    }).catch(function() {
      el.innerHTML = '<div class="empty">Failed to load hotspots</div>';
    });
  }

  // 3. Frontier
  function loadFrontier() {
    var el = document.getElementById('p-frontier');
    el.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading frontier data...</p></div>';
    api('/api/frontier?top_k=15').then(function(d) {
      var f = d.topics || [];
      var html = '<div class="hero"><div class="label">Research Frontier</div><h1>Frontier Identification</h1><p>Emerging topics with high growth rates</p></div><div class="card">';
      f.forEach(function(item, i) {
        var g = item.growth || 0;
        var label = (i + 1) + '. ' + (item.name || item.topic) + '  (+' + fmt(g) + ')';
        html += '<div class="result"><div class="r-title">' + (i + 1) + '. ' + esc(item.name || item.topic) + '</div><div class="r-meta">Growth: +' + fmt(g) + ' &middot; Heat: ' + fmt(item.heat) + '</div></div>';
      });
      html += '</div>';
      el.innerHTML = html;
    }).catch(function() {
      el.innerHTML = '<div class="empty">Failed to load frontier data</div>';
    });
  }

  // 4. Predict
  function loadPredict() {
    var el = document.getElementById('p-predict');
    el.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading predictions...</p></div>';
    api('/api/predict?delta=5').then(function(d) {
      var p = d.predictions || d.topics || [];
      var html = '<div class="hero"><div class="label">Trend Prediction</div><h1>Growth Forecast</h1><p>Predicted growth trends (AUC=' + (d.auc || '0.94') + ')</p></div><div class="card">';
      p.forEach(function(item) {
        var ch = item.predicted_growth || item.growth || 0;
        var dir = ch >= 0 ? '' : '';
        html += '<div class="result"><div class="r-title">' + esc(item.name || item.topic) + '</div><div class="r-meta">Predicted: ' + dir + fmt(Math.abs(ch)) + ' &middot; Current: ' + fmt(item.growth || 0) + '</div></div>';
      });
      html += '</div>';
      el.innerHTML = html;
    }).catch(function() {
      el.innerHTML = '<div class="empty">Prediction model unavailable</div>';
    });
  }

  // 5. Knowledge Graph
  function loadKG() {
    var el = document.getElementById('p-kg');
    el.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading knowledge graph...</p></div>';
    api('/api/science-map/entity-types').then(function(types) {
      var typeHtml = types.types ? types.types.map(function(t) {
        return bar(t.count / types.types[0].count * 100, t.type + '  (' + fmt(t.count) + ')');
      }).join('') : '';
      el.innerHTML =
        '<div class="hero"><div class="label">Knowledge Graph</div><h1>Knowledge Graph</h1><p>' + fmt(types.total_entities || 0) + ' entities across ' + (types.types ? types.types.length : 0) + ' types</p></div>' +
        '<div class="card"><div class="card-title">Entity Distribution</div>' + (typeHtml || '<div class="empty">No data</div>') + '</div>';
    }).catch(function() {
      el.innerHTML = '<div class="empty">Knowledge graph unavailable</div>';
    });
  }

  // 6. Science Map
  function loadScienceMap() {
    var el = document.getElementById('p-science');
    el.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading science map...</p></div>';
    Promise.all([
      api('/api/science-map/publication-trends').catch(function(){return {trends:[]}}),
      api('/api/science-map/entity-types').catch(function(){return {types:[]}})
    ]).then(function(results) {
      var trends = results[0].trends || [];
      var types = results[1].types || [];
      var mx = 1;
      for (var i = 0; i < trends.length; i++) if (trends[i].nodes > mx) mx = trends[i].nodes;
      var bars = trends.slice(-20).map(function(t) {
        return '<div class="timeline-bar" style="height:' + (t.nodes/mx*100) + '%;opacity:0.5" title="' + t.year + ': ' + fmt(t.nodes) + ' pubs"></div>';
      }).join('');
      var typeRows = types.map(function(t) {
        return '<tr><td>' + esc(t.type) + '</td><td>' + fmt(t.count) + '</td></tr>';
      }).join('');
      el.innerHTML =
        '<div class="hero"><div class="label">Science Map</div><h1>Science Map</h1><p>Research landscape overview</p></div>' +
        '<div style="display:grid;grid-template-columns:2fr 1fr;gap:12px">' +
        '<div class="card"><div class="card-title">Publication Trends</div><div class="timeline">' + bars + '</div></div>' +
        '<div class="card"><div class="card-title">Entity Types</div><table>' + typeRows + '</table></div></div>';
    }).catch(function() {
      el.innerHTML = '<div class="empty">Science map unavailable</div>';
    });
  }

  // 7. Search
  function loadSearch() {
    var el = document.getElementById('p-search');
    el.innerHTML =
      '<div class="hero"><div class="label">Literature Search</div><h1>Search</h1><p>Search across ' + fmt(15478) + ' papers</p></div>' +
      '<div class="card"><div class="search-group"><input type="text" id="search-input" placeholder="Enter keywords..." style="flex:1">' +
      '<select id="search-lang"><option value="all">All</option><option value="zh">Chinese</option><option value="en">English</option></select>' +
      '<button class="btn btn-primary" id="search-btn">Search</button></div></div>' +
      '<div id="search-results"><div class="empty">Enter keywords to search</div></div>';

    document.getElementById('search-btn').addEventListener('click', function() {
      var q = document.getElementById('search-input').value.trim();
      if (!q) return;
      var res = document.getElementById('search-results');
      res.innerHTML = '<div class="loading"><div class="spinner"></div><p>Searching...</p></div>';
      api('/api/search?q=' + encodeURIComponent(q)).then(function(d) {
        var r = d.results || [];
        res.innerHTML = '<div class="card"><div class="card-title">Results <span class="tag">' + r.length + ' found</span></div>' +
          (r.length ? r.map(function(item) {
            return '<div class="result"><div class="r-title">' + esc(item.title) + '</div><div class="r-meta"><span class="r-source">' + esc(item.source||'') + '</span>' + esc(item.year||'') + ' &middot; ' + esc(item.authors||'') + '</div></div>';
          }).join('') : '<div class="empty">No results found</div>') + '</div>';
      }).catch(function() {
        res.innerHTML = '<div class="empty">Search failed</div>';
      });
    });

    document.getElementById('search-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('search-btn').click();
    });
  }

  // 8. Chat Assistant
  function loadChat() {
    var el = document.getElementById('p-chat');
    el.innerHTML =
      '<div class="hero"><div class="label">AI Assistant</div><h1>SKWM Assistant</h1><p>Ask questions about your research domain</p></div>' +
      '<div class="card"><div class="search-group"><input type="text" id="chat-input" placeholder="Ask a research question..." style="flex:1">' +
      '<button class="btn btn-primary" id="chat-btn">Send</button></div></div>' +
      '<div id="chat-results"><div class="empty">Try asking: What are the hottest topics in China-Arab cultural tourism?</div></div>';
    document.getElementById('chat-btn').addEventListener('click', function() {
      var q = document.getElementById('chat-input').value.trim();
      if (!q) return;
      var res = document.getElementById('chat-results');
      res.innerHTML = '<div class="loading"><div class="spinner"></div><p>Thinking...</p></div>';
      fetch('/api/query/kg', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({question: q})
      }).then(function(r) { return r.json(); }).then(function(d) {
        res.innerHTML = '<div class="card"><div class="card-title">Response</div><div style="font-size:14px;line-height:1.8;white-space:pre-wrap">' + esc(d.answer || d.message || 'No response') + '</div></div>';
      }).catch(function() {
        res.innerHTML = '<div class="empty">Request failed</div>';
      });
    });
    document.getElementById('chat-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('chat-btn').click();
    });
  }

  // 9. Reports
  function loadReports() {
    var el = document.getElementById('p-reports');
    el.innerHTML =
      '<div class="hero"><div class="label">Report Generation</div><h1>Research Reports</h1><p>Generate structured research reports</p></div>' +
      '<div class="card"><div class="search-group"><input type="text" id="report-topic" placeholder="Research topic..." style="flex:1">' +
      '<button class="btn btn-primary" id="report-btn">Generate</button></div></div>' +
      '<div id="report-result"><div class="empty">Enter a topic to generate a report</div></div>';
    document.getElementById('report-btn').addEventListener('click', function() {
      var topic = document.getElementById('report-topic').value.trim();
      if (!topic) return;
      var res = document.getElementById('report-result');
      res.innerHTML = '<div class="loading"><div class="spinner"></div><p>Generating report...</p></div>';
      fetch('/api/report', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({topic: topic, user: 'teacher'})
      }).then(function(r) { return r.json(); }).then(function(d) {
        var rep = d.report || {};
        res.innerHTML = '<div class="card"><div class="card-title">' + esc(rep.title || 'Research Report') + '</div>' +
          '<div style="font-size:13px;line-height:1.7;white-space:pre-wrap">' + esc(rep.summary || rep.content || JSON.stringify(rep, null, 2).slice(0, 2000)) + '</div></div>';
      }).catch(function() {
        res.innerHTML = '<div class="empty">Report generation failed</div>';
      });
    });
    document.getElementById('report-topic').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('report-btn').click();
    });
  }

  // 10. Institutions
  function loadInstitutions() {
    var el = document.getElementById('p-institutions');
    el.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading institutions...</p></div>';
    api('/api/stats').then(function(d) {
      el.innerHTML =
        '<div class="hero"><div class="label">Institution Analysis</div><h1>Institutions</h1><p>Research institution overview</p></div>' +
        '<div class="stats">' +
        '<div class="stat-card"><div class="num">' + fmt(d.total || 15478) + '</div><div class="label">Total Papers</div></div>' +
        '<div class="stat-card"><div class="num">' + fmt(d.relations || 1320) + '</div><div class="label">Relations</div></div>' +
        '<div class="stat-card"><div class="num">' + (d.year_min || 1859) + '&ndash;' + (d.year_max || 2026) + '</div><div class="label">Timespan</div></div>' +
        '<div class="stat-card"><div class="num">' + fmt(d.catalog || 200) + '</div><div class="label">Catalog Papers</div></div>' +
        '</div>' +
        '<div class="card"><div class="card-title">Data Sources</div>' +
        '<table><tr><th>Source</th><th>Count</th></tr>' +
        '<tr><td>B1 Literature Table</td><td>' + fmt(11488) + '</td></tr>' +
        '<tr><td>Arabic Literature</td><td>' + fmt(d.arabic || 4193) + '</td></tr>' +
        '<tr><td>Catalog</td><td>' + fmt(d.catalog || 200) + '</td></tr>' +
        '</table></div>';
    }).catch(function() {
      el.innerHTML = '<div class="empty">Failed to load institution data</div>';
    });
  }

  // ── Register all page loaders ──
  var loaders = {
    overview: loadDashboard,
    hotspots: loadHotspots,
    frontier: loadFrontier,
    predict: loadPredict,
    kg: loadKG,
    science: loadScienceMap,
    search: loadSearch,
    chat: loadChat,
    reports: loadReports,
    institutions: loadInstitutions
  };

  // Load initial page
  loadDashboard();

  // Load pages on navigation
  document.getElementById('nav').addEventListener('click', function(e) {
    var btn = e.target.closest('.nav-btn');
    if (!btn) return;
    var page = btn.getAttribute('data-p');
    var loader = loaders[page];
    if (loader) loader();
  });

})();
</script>
</body>
</html>
